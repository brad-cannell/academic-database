name: Publish dashboard

# Renders dashboard/index.qmd and publishes it to GitHub Pages whenever
# data/ or dashboard/ changes on main. Replaces running `quarto render`
# locally just to view current state -- the published page always reflects
# the latest commit on main. Uses the standard Actions-based Pages deploy
# (configure-pages/upload-pages-artifact/deploy-pages) so Pages itself
# doesn't need a manual "Deploy from a branch" setting -- this workflow's
# pages:write permission is sufficient to enable and deploy it.

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "data/**"
  workflow_dispatch: {} # allows manually triggering a rebuild from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; a newer push supersedes an
# in-flight older one rather than queuing behind it.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::readr
            any::dplyr
            any::tidyr
            any::ggplot2
            any::knitr
            any::rmarkdown

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render dashboard
        run: quarto render dashboard/index.qmd

      # enablement: true tells this step to create/enable the Pages site
      # (source = GitHub Actions) via the API if it doesn't exist yet,
      # instead of just erroring out on the first run.
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
